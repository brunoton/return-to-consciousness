title: "Return to Consciousness"
description: "A Philosophical Journey from Materialism to Meaning"
author: "Bruno Tonetto"
url: "https://brunoton.github.io"
baseurl: "/return-to-consciousness"

# Theme
theme: minima

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# SEO
lang: en_US
twitter:
  username: # Add if you have Twitter
  card: summary_large_image

# Analytics (add when ready)
# google_analytics: # Add Google Analytics ID

# Social links
linkedin_username: brunotonetto

# Navigation
header_pages:
  - complete-essay.md
  # - dissociation-to-integration.md
  - ego-less-ai.md
  - myth-of-metaphysical-neutrality.md
  # - one-structure.md
  - taking-et-seriously.md
  - truth-is-not-neutral.md


# Build settings
markdown: kramdown
highlighter: rouge
permalink: pretty

# Exclude from processing
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - platform-strategy.md
  - node_modules
  - vendor/